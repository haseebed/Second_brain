{% extends "layout.html" %}
{% block content %}

<h2>Watch / Read List</h2>

<!-- Add item form -->
<div class="card mb-4 p-3">
  <form action="/watchlist" method="POST" class="row g-2">
    <div class="col-md-4">
      <input type="text" name="content" class="form-control" placeholder="Title" required/>
    </div>
    <div class="col-md-2">
      <select name="kind" class="form-select">
        <option value="show">Show</option>
        <option value="movie">Movie</option>
        <option value="book">Book</option>
        <option value="article">Article</option>
        <option value="youtube">YouTube</option>
      </select>
    </div>
    <div class="col-md-4">
      <input type="text" name="url" class="form-control" placeholder="URL (optional)"/>
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary w-100" type="submit">Add</button>
    </div>
  </form>
</div>

<!-- List -->
{% if items %}
  {% for item in items %}
    <div class="card mb-2 p-3 d-flex flex-row justify-content-between align-items-center">
      <div>
        <strong>{{ item['content'] }}</strong>
        <span class="badge bg-secondary ms-2">{{ item['subject'] }}</span>
        {% if item['url'] %}
          <a href="{{ item['url'] }}" target="_blank" class="ms-2 small">open link</a>
        {% endif %}
      </div>
      <form action="/delete/{{ item['id'] }}" method="POST">
        <button class="btn btn-sm btn-outline-danger" type="submit">🗑️</button>
      </form>
    </div>
  {% endfor %}
{% else %}
  <p class="text-muted">Nothing saved yet. Add something above!</p>
{% endif %}

{% endblock %}
