<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <title>Second Brain</title>
</head>
<body>

  <nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">🧠 Second Brain</a>
    <div class="d-flex gap-3">
      <a class="nav-link text-white" href="/">Today</a>
      <a class="nav-link text-white" href="/inbox">Inbox</a>
      <a class="nav-link text-white" href="/deadlines">Deadlines</a>
      <a class="nav-link text-white" href="/watchlist">Watch List</a>
    </div>
  </nav>

  <!-- Quick Capture Bar -->
  <div class="bg-dark py-2 px-4 border-bottom border-secondary">
    <form action="/inbox" method="POST" class="d-flex gap-2">
    <input type="text" name="content" class="form-control" placeholder="Capture anything..." autocomplete="off"/>
    <button class="btn btn-primary px-4" type="submit">Save</button>
    </form>
  </div>

  <!-- Page content goes here -->
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
