<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Second Brain</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@adminkit/core@latest/dist/css/app.css"/>
  <style>

    body, .content, .main, .wrapper { background: #f6f5f2 !important; }
    .sidebar { background: #222E3C !important; }

    /* ── Active nav highlight ─────────────── */
    .sidebar-item .sidebar-link {
      border-radius: 8px;
      margin: 1px 4px;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-item .sidebar-link.active {
      background: rgba(255,255,255,0.12) !important;
      color: #ffffff !important;
      border-radius: 8px;
    }

    .sidebar-item .sidebar-link.active i { color: #ffffff !important; }

    /* ── Topbar ───────────────────────────── */
    .navbar-bg {
      background: #f6f5f2 !important;
      border-bottom: 1px solid #e8e6e1 !important;
      box-shadow: none !important;
      position: relative;
      z-index: 200;
    }

    /* ── Hamburger — desktop hidden ───────── */
    .hamburger-btn {
      display: none;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid #e8e6e1;
      border-radius: 10px;
      padding: 6px 10px;
      cursor: pointer;
      color: #555;
      transition: background 0.15s;
    }

    .hamburger-btn:hover { background: #eeede9; }

    /* ── Mobile dropdown nav ──────────────── */
    .mobile-nav {
      display: none;
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: #222E3C;
      z-index: 199;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s ease;
    }

    .mobile-nav.open { max-height: 400px; }

    .mobile-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      color: #a8b4c0;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s, color 0.15s;
    }

    .mobile-nav a:hover { background: rgba(255,255,255,0.07); color: #fff; }
    .mobile-nav a.active { background: rgba(255,255,255,0.12); color: #fff; }
    .mobile-nav a svg { width: 16px; height: 16px; flex-shrink: 0; }

    @media (max-width: 768px) {
      .hamburger-btn { display: flex !important; }
      .mobile-nav    { display: block !important; }
      .sidebar       { display: none !important; }
      .main          { margin-left: 0 !important; }
    }

    /* ── Capture section (today only) ─────── */
    .capture-section {
      padding: 40px 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .capture-label {
      font-size: 22px;
      font-weight: 700;
      color: #222E3C;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .capture-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 640px;
    }

    .capture-row .form-control {
      border-radius: 20px !important;
      font-size: 15px !important;
      padding: 12px 22px !important;
      border: 1.5px solid #e8e6e1 !important;
      background: #fff !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06) !important;
      transition: border-color 0.15s, box-shadow 0.15s !important;
      height: auto !important;
    }

    .capture-row .form-control:focus {
      border-color: #222E3C !important;
      box-shadow: 0 0 0 4px rgba(34,46,60,0.1) !important;
      outline: none !important;
    }

    .capture-row .btn-capture {
      background: #222E3C;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }

    .capture-row .btn-capture:hover  { background: #1a2430; }
    .capture-row .btn-capture:active { transform: scale(0.97); }

    /* ── Page content ─────────────────────── */
    .page-content { padding: 0 32px 32px; }

    /* ── All buttons use nav colour ───────── */
    .btn { border-radius: 20px !important; font-weight: 500 !important; }

    .btn-primary {
      background: #222E3C !important;
      border-color: #222E3C !important;
      color: #fff !important;
    }

    .btn-primary:hover {
      background: #1a2430 !important;
      border-color: #1a2430 !important;
    }

    .form-control { border-radius: 20px !important; }

    .form-control:focus {
      border-color: #222E3C !important;
      box-shadow: 0 0 0 3px rgba(34,46,60,0.12) !important;
    }

    .card { border-radius: 12px !important; border-color: #e8e6e1 !important; }

  </style>
</head>
<body>
<div class="wrapper">

  <!-- ── SIDEBAR (desktop only) ─────────── -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-content js-simplebar">
      <a class="sidebar-brand" href="/">
        🧠 <span class="align-middle">Second Brain</span>
      </a>
      <ul class="sidebar-nav">
        <li class="sidebar-header">Pages</li>
        <li class="sidebar-item">
          <a href="/" class="sidebar-link {{ 'active' if request.path == '/' else '' }}">
            <i class="align-middle" data-feather="home"></i>
            <span class="align-middle">Today</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="/inbox" class="sidebar-link {{ 'active' if request.path == '/inbox' else '' }}">
            <i class="align-middle" data-feather="inbox"></i>
            <span class="align-middle">Inbox</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="/deadlines" class="sidebar-link {{ 'active' if request.path == '/deadlines' else '' }}">
            <i class="align-middle" data-feather="clock"></i>
            <span class="align-middle">Deadlines</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="/watchlist" class="sidebar-link {{ 'active' if request.path == '/watchlist' else '' }}">
            <i class="align-middle" data-feather="bookmark"></i>
            <span class="align-middle">Watch List</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- ── MAIN ───────────────────────────── -->
  <div class="main">

    <!-- Topbar -->
    <nav class="navbar navbar-expand navbar-light navbar-bg px-3">
      <!-- Hamburger (mobile only) -->
      <button class="hamburger-btn" id="hamburger-btn" type="button">
        <i data-feather="menu" style="width:18px;height:18px;"></i>
      </button>

      <!-- Mobile dropdown nav (hidden on desktop via CSS) -->
      <div class="mobile-nav" id="mobile-nav">
        <a href="/" class="{{ 'active' if request.path == '/' else '' }}">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Today
        </a>
        <a href="/inbox" class="{{ 'active' if request.path == '/inbox' else '' }}">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
          Inbox
        </a>
        <a href="/deadlines" class="{{ 'active' if request.path == '/deadlines' else '' }}">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Deadlines
        </a>
        <a href="/watchlist" class="{{ 'active' if request.path == '/watchlist' else '' }}">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
          Watch List
        </a>
      </div>
    </nav>

    <!-- Capture bar — today page only -->
    {% if request.path == '/' %}
    <div class="capture-section">
      <p class="capture-label">What's on your mind?</p>
      <form action="/inbox" method="POST" class="capture-row">
        <input
          type="text"
          name="content"
          class="form-control"
          placeholder="Capture anything — ideas, links, notes..."
          autocomplete="off"
          autofocus
        />
        <button type="submit" class="btn-capture">Save</button>
      </form>
    </div>
    {% endif %}

    <!-- Page content -->
    <div class="page-content">
      {% block content %}{% endblock %}
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@adminkit/core@latest/dist/js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<script>
  feather.replace();

  const btn       = document.getElementById('hamburger-btn');
  const mobileNav = document.getElementById('mobile-nav');
  let open = false;

  btn.addEventListener('click', () => {
    open = !open;
    mobileNav.classList.toggle('open', open);
  });

  // Close when a link is clicked
  mobileNav.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      open = false;
      mobileNav.classList.remove('open');
    });
  });

  // Close when clicking outside
  document.addEventListener('click', (e) => {
    if (!btn.contains(e.target) && !mobileNav.contains(e.target)) {
      open = false;
      mobileNav.classList.remove('open');
    }
  });
</script>
</body>
</html>
